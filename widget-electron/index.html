<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    -webkit-app-region: drag;
  }

  #root {
    background: transparent !important;
    animation: enter 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    transform: translateY(-10px) scale(0.96);
    opacity: 0;
  }
  @keyframes enter { to { transform: translateY(0) scale(1); opacity: 1; } }

  .pill-wrap, .pill { cursor: pointer; }
  .pill-wrap, .pill, .menu-dots, .action-orb-wrap, .agent-icon {
    -webkit-app-region: no-drag;
  }
  .pill-wrap {
    position: relative;
    padding: 0;
    border-radius: 999px;
    overflow: hidden;
    background: transparent;
  }

  .border-spinner {
    position: absolute;
    top: 50%; left: 50%;
    z-index: 0;
    width: 380px; height: 380px;
    margin: -190px;
    border-radius: 50%;
    opacity: 0.7;
    background: conic-gradient(
      from 0deg,
      transparent 0%, transparent 70%,
      rgba(249,115,22,0.15) 76%,
      #FB923C 82%,
      #F97316 84%,
      rgba(249,115,22,0.12) 88%,
      transparent 94%, transparent 100%
    );
    will-change: transform;
    pointer-events: none;
  }
  .idle .border-spinner { opacity: 0.28; }

  /* Cristal fino: se ve el escritorio, solo la forma del pill */
  .pill {
    position: relative;
    z-index: 1;
    width: 360px;
    height: 56px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 14px 0 12px;
    gap: 10px;
    overflow: hidden;
    background: transparent;
  }
  .pill::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: -2;
    background: linear-gradient(
      165deg,
      rgba(255, 255, 255, 0.14) 0%,
      rgba(255, 255, 255, 0.06) 42%,
      rgba(255, 255, 255, 0.04) 100%
    );
    -webkit-backdrop-filter: blur(22px) saturate(165%);
    backdrop-filter: blur(22px) saturate(165%);
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.28),
      inset 0 -1px 0 rgba(0, 0, 0, 0.06);
    pointer-events: none;
  }
  .pill::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: -1;
    background: linear-gradient(
      105deg,
      rgba(255, 255, 255, 0.14) 0%,
      rgba(255, 255, 255, 0.03) 28%,
      transparent 45%
    );
    pointer-events: none;
  }
  .pill > * { position: relative; z-index: 1; }

  /* Icono Mike: punto central + anillos pulsantes (mockup) */
  .agent-icon {
    position: relative;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-core {
    position: relative; z-index: 3;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #F97316;
    box-shadow: 0 0 10px rgba(251,146,60,0.95), 0 0 18px rgba(249,115,22,0.55);
  }
  .icon-ring {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 1.5px solid rgba(249,115,22,0.55);
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: icon-ring-pulse 2.2s ease-out infinite;
  }
  .icon-ring.r1 { width: 14px; height: 14px; animation-delay: 0s; }
  .icon-ring.r2 { width: 22px; height: 22px; animation-delay: 0.55s; border-color: rgba(249,115,22,0.38); }
  .icon-ring.r3 { width: 30px; height: 30px; animation-delay: 1.1s; border-color: rgba(249,115,22,0.22); }
  .icon-bars { display: none; }

  .capture-icon {
    display: none;
    position: relative; z-index: 1;
    width: 18px; height: 13px;
    border: 2px solid #F97316;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(249,115,22,0.5);
  }
  .capture-icon::before {
    content: '';
    position: absolute; top: -5px; left: 4px;
    width: 6px; height: 4px;
    border: 2px solid #F97316; border-bottom: none;
    border-radius: 3px 3px 0 0;
  }
  .capture-icon::after {
    content: '';
    position: absolute; top: 3px; right: -3px;
    width: 5px; height: 5px;
    border-radius: 50%; background: #FDBA74;
    animation: capture-blink 0.9s ease-in-out infinite;
  }

  .text-block {
    flex-shrink: 0; min-width: 108px; user-select: none;
  }
  .title {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.02em;
    color: rgba(255, 255, 255, 0.96);
    line-height: 1.2;
  }
  .status {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 12px; font-weight: 500;
    color: #FB923C;
    line-height: 1.25; margin-top: 2px;
    transition: color 0.35s ease;
  }

  .wave-line {
    flex: 1; min-width: 0; height: 28px;
    position: relative; overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
    mask-image:         linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
  }
  .wave-line-inner {
    position: absolute; top: 50%; left: 0;
    width: 200%; height: 24px;
    will-change: transform;
  }
  .wave-line svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .wave-path {
    fill: none;
    stroke: url(#greenStroke);
    stroke-width: 2.2;
    stroke-linecap: round; stroke-linejoin: round;
    filter: url(#greenGlow);
  }
  .wave-path-2 {
    fill: none;
    stroke: url(#greenStrokeSoft);
    stroke-width: 4; stroke-linecap: round; opacity: 0.35;
  }

  /* ── Tres puntos interactivos ── */
  .menu-dots {
    display: flex; flex-direction: column; gap: 3px;
    flex-shrink: 0; padding: 6px 5px;
    border-radius: 7px;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s;
    opacity: 0.4;
    -webkit-user-select: none;
  }
  .menu-dots:hover { opacity: 1; background: rgba(255, 255, 255, 0.1); }
  .menu-dots.open  { opacity: 1; background: rgba(249, 115, 22, 0.2); }
  .menu-dots span {
    display: block; width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transition: background 0.2s;
  }
  .menu-dots.open span { background: #FB923C; }

  /* Esfera derecha: glow verde + partículas en anillo */
  .action-orb-wrap {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-glow {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(249,115,22,0.65) 0%,
      rgba(249,115,22,0.28) 38%,
      rgba(234,88,12,0.08) 58%,
      transparent 72%);
    filter: blur(5px);
    animation: orb-glow-pulse 2.8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb-ring-static {
    position: absolute;
    width: 44px; height: 44px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .orb-dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 3px; height: 3px;
    margin: -1.5px 0 0 -1.5px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #FFF7ED 0%, #FB923C 55%, #EA580C 100%);
    box-shadow: 0 0 5px rgba(251,146,60,0.9);
    transform: rotate(var(--angle)) translateY(-21px);
    animation: dot-twinkle 2.4s ease-in-out infinite;
    animation-delay: var(--tw-delay, 0s);
  }
  .action-orb {
    position: relative; z-index: 1;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 34% 28%,
      #FFF7ED 0%,
      #FED7AA 12%,
      #FB923C 28%,
      #F97316 52%,
      #EA580C 72%,
      #7C2D12 92%,
      #431407 100%);
    box-shadow:
      inset 0 3px 7px rgba(255,237,213,0.75),
      inset 0 -5px 12px rgba(194,65,12,0.55),
      inset -4px -2px 8px rgba(124,45,18,0.4);
    animation: orb-float 3s ease-in-out infinite;
    overflow: visible;
  }
  .action-orb::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 72% 78%,
      transparent 55%,
      rgba(67,20,7,0.55) 100%);
    pointer-events: none;
  }
  .action-orb::after {
    content: '';
    position: absolute; top: 10%; left: 16%;
    width: 38%; height: 26%; border-radius: 50%;
    background: radial-gradient(ellipse,
      rgba(255,255,255,0.92) 0%,
      rgba(255,237,213,0.35) 45%,
      transparent 72%);
    animation: orb-specular 2.8s ease-in-out infinite;
    pointer-events: none;
  }

  /* Partículas orbitales — círculo completo alrededor de la esfera */
  .orb-particle {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    pointer-events: none;
    transform-origin: 0 0;
    /* dur, delay, pdur, pdelay se inyectan como custom props en JS por elemento */
    animation:
      p-orbit var(--dur, 3s) linear infinite var(--delay, 0s),
      p-pulse var(--pdur, 1.8s) ease-in-out infinite var(--pdelay, 0s);
  }
  @keyframes p-orbit {
    from { transform: rotate(0deg)   translateX(var(--r, 24px)); }
    to   { transform: rotate(360deg) translateX(var(--r, 24px)); }
  }
  @keyframes p-pulse {
    0%,100% { opacity: var(--opa-lo); box-shadow: 0 0 3px 1px rgba(251,146,60,0.55); }
    50%     { opacity: var(--opa-hi); box-shadow: 0 0 8px 3px rgba(251,146,60,1), 0 0 16px 6px rgba(249,115,22,0.45); }
  }
  .idle .orb-particle { filter: saturate(0) brightness(0.45); opacity: 0.25 !important; }

  /* ── Estados ── */
  .idle .pill::before {
    background: linear-gradient(
      165deg,
      rgba(255, 255, 255, 0.1) 0%,
      rgba(255, 255, 255, 0.04) 100%
    );
    border-color: rgba(255, 255, 255, 0.16);
  }
  .idle .status { color: #9CA3AF; }
  .idle .wave-path { stroke-width: 1.4; opacity: 0.35; }
  .idle .action-orb {
    background: radial-gradient(circle at 34% 28%,
      #E8E8E8 0%, #BDBDBD 25%, #9E9E9E 55%, #616161 80%, #424242 100%);
    box-shadow:
      inset 0 2px 6px rgba(255,255,255,0.45),
      inset 0 -4px 10px rgba(0,0,0,0.35);
  }
  .idle .action-orb::before {
    background: radial-gradient(circle at 72% 78%,
      transparent 50%, rgba(30,30,30,0.5) 100%);
  }
  .idle .icon-core {
    background: #9E9E9E;
    box-shadow: 0 0 6px rgba(180,180,180,0.5);
  }
  .idle .icon-ring { border-color: rgba(140,140,140,0.35); }
  .idle .orb-glow { opacity: 0.35; filter: blur(5px) saturate(0.3); }
  .idle .orb-dot { filter: saturate(0.2) brightness(0.5); opacity: 0.35; }

  .user .status { color: #FB923C; }
  .user .wave-path { stroke-width: 2.6; }
  .user .icon-core { animation: icon-core-pulse 0.5s ease-in-out infinite; }
  .user .icon-ring { animation-duration: 1.1s; }

  .thinking .status { color: #FDBA74; }
  .thinking .wave-path { stroke-width: 1.4; opacity: 0.6; }
  .thinking .action-orb { animation: orb-float 2.2s ease-in-out infinite, orb-breathe 2.2s ease-in-out infinite; }

  .ai .status { color: #FDBA74; }
  .ai .wave-path { stroke-width: 2.4; }
  .ai .icon-core { box-shadow: 0 0 14px rgba(253,186,116,1); }

  .connecting .status { color: #EA580C; }
  .capturing .status { color: #FDBA74; }
  .capturing .icon-bars { display: none !important; }
  .capturing .capture-icon { display: block; animation: capture-pulse 0.7s ease-in-out infinite; }
  .capturing .pill { animation: capture-flash 1.4s ease-in-out infinite; }
  .capturing .wave-path { stroke: #FFEDD5; stroke-width: 2.8; opacity: 1; }
  .capturing .action-orb { animation: capture-pulse 0.7s ease-in-out infinite; }
  .analyzing .status { color: #A7F3D0; }
  .analyzing .wave-path { stroke-width: 2.2; opacity: 0.85; }
  .analyzing .icon-ring { animation-duration: 0.9s; }

  /* ── Popup expandido (vive dentro de la ventana agrandada) ── */
  #root {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .popup-panel {
    -webkit-app-region: no-drag;
    position: relative;
    width: 352px;
    margin-top: 8px;
    border-radius: 20px;
    padding: 14px 12px 12px;
    background: transparent;
    transform-origin: top center;
    animation: popup-in 0.22s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }
  /* Mismo cristal que el pill */
  .popup-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: 0;
    background: linear-gradient(
      165deg,
      rgba(255, 255, 255, 0.14) 0%,
      rgba(255, 255, 255, 0.06) 42%,
      rgba(255, 255, 255, 0.04) 100%
    );
    -webkit-backdrop-filter: blur(22px) saturate(165%);
    backdrop-filter: blur(22px) saturate(165%);
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.28),
      inset 0 -1px 0 rgba(0, 0, 0, 0.06);
    pointer-events: none;
  }
  /* Destello especular igual al pill */
  .popup-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: 0;
    background: linear-gradient(
      105deg,
      rgba(255, 255, 255, 0.14) 0%,
      rgba(255, 255, 255, 0.03) 28%,
      transparent 45%
    );
    pointer-events: none;
  }
  .popup-panel > * { position: relative; z-index: 1; }
  .popup-panel.closing {
    animation: popup-out 0.15s ease-in forwards;
    pointer-events: none;
  }

  @keyframes popup-in {
    from { opacity:0; transform: scaleY(0.88) translateY(-6px); }
    to   { opacity:1; transform: scaleY(1)    translateY(0); }
  }
  @keyframes popup-out {
    from { opacity:1; transform: scaleY(1)    translateY(0); }
    to   { opacity:0; transform: scaleY(0.88) translateY(-6px); }
  }

  .popup-section-label {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.28);
    padding: 0 4px 7px;
  }

  /* ── Proyecto activo ── */
  .popup-project-row {
    -webkit-app-region: no-drag;
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    cursor: default;
  }
  .popup-project-icon { font-size: 13px; flex-shrink: 0; }
  .popup-project-name {
    flex: 1; min-width: 0;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.78);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .popup-project-change {
    -webkit-app-region: no-drag;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 11px; font-weight: 600;
    color: #FB923C; cursor: pointer;
    padding: 3px 9px; border-radius: 7px;
    border: 1px solid rgba(249,115,22,0.45);
    background: rgba(249,115,22,0.1);
    transition: all 0.13s ease; flex-shrink: 0;
  }
  .popup-project-change:hover {
    background: rgba(249,115,22,0.22);
    border-color: rgba(249,115,22,0.65);
  }

  /* ── Acciones rápidas ── */
  .actions-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .action-btn {
    -webkit-app-region: no-drag;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    padding: 10px 6px 9px; border-radius: 12px; cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    transition: all 0.14s ease;
  }
  .action-btn:hover {
    background: rgba(249,115,22,0.13);
    border-color: rgba(249,115,22,0.38);
    box-shadow: inset 0 1px 0 rgba(255,237,213,0.15), 0 0 10px rgba(249,115,22,0.12);
  }
  .action-btn:active { transform: scale(0.95); }
  .action-icon { font-size: 17px; line-height: 1; }
  .action-label {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.68); text-align: center;
  }
  .action-btn:hover .action-label { color: #FDBA74; }
  .voice-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    margin-bottom: 4px;
  }
  .voice-chip {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 12px; font-weight: 500; text-align: center;
    color: rgba(255,255,255,0.65);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px; padding: 7px 4px;
    cursor: pointer; text-transform: capitalize;
    transition: all 0.14s ease;
    -webkit-app-region: no-drag;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .voice-chip:hover {
    background: rgba(249,115,22,0.14);
    border-color: rgba(249,115,22,0.4);
    color: #FDBA74;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 0 8px rgba(249,115,22,0.15);
  }
  .voice-chip.active {
    background: rgba(249,115,22,0.2);
    border-color: rgba(249,115,22,0.65);
    color: #FB923C; font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,237,213,0.2), 0 0 10px rgba(249,115,22,0.2);
  }

  .popup-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 10px 0 8px; }

  .popup-btn {
    -webkit-app-region: no-drag;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 12px; cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.14s ease;
  }
  .popup-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.1);
  }
  .popup-btn.danger:hover {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.2);
  }
  .popup-btn-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
  .popup-btn-text {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.82);
    letter-spacing: -0.01em;
  }
  .popup-btn.danger .popup-btn-text { color: rgba(248,113,113,0.85); }

  /* ── Keyframes ── */
  @keyframes icon-ring-pulse {
    0%   { transform: translate(-50%,-50%) scale(0.82); opacity: 0.85; }
    70%  { opacity: 0.35; }
    100% { transform: translate(-50%,-50%) scale(1.18); opacity: 0; }
  }
  @keyframes icon-core-pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.2); }
  }
  @keyframes orb-glow-pulse {
    0%,100% { opacity: 0.75; transform: scale(0.96); }
    50%     { opacity: 1; transform: scale(1.06); }
  }
  @keyframes dot-twinkle {
    0%,100% { opacity: 0.45; transform: rotate(var(--angle)) translateY(-21px) scale(0.85); }
    50%     { opacity: 1; transform: rotate(var(--angle)) translateY(-21px) scale(1.15); }
  }
  @keyframes bar-shimmer {
    0%,100%{transform:scaleY(.88);box-shadow:0 0 5px rgba(249,115,22,.55)}
    50%    {transform:scaleY(1.14);box-shadow:0 0 12px rgba(251,146,60,1)}
  }
  @keyframes orb-float { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
  @keyframes orb-specular {
    0%,100%{opacity:.75;transform:translate(0,0)} 50%{opacity:1;transform:translate(1px,1px)}
  }
  @keyframes orb-breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes capture-pulse {
    0%,100%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.08);filter:brightness(1.35)}
  }
  @keyframes capture-blink { 0%,100%{opacity:.35} 50%{opacity:1} }
  @keyframes capture-flash {
    0%,100% { filter: brightness(1); }
    45%     { filter: brightness(1.12); box-shadow: inset 0 0 24px rgba(251,146,60,0.2); }
  }
</style>
</head>
<body>
<div class="idle" id="root">
  <div class="pill-wrap">
    <div class="border-spinner"></div>
    <div class="pill">
      <div class="agent-icon">
        <span class="icon-ring r3" aria-hidden="true"></span>
        <span class="icon-ring r2" aria-hidden="true"></span>
        <span class="icon-ring r1" aria-hidden="true"></span>
        <span class="icon-core" aria-hidden="true"></span>
        <div class="icon-bars" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="capture-icon" aria-hidden="true"></div>
      </div>
      <div class="text-block">
        <div class="title">Mike</div>
        <div class="status" id="status">Listo para ayudarte</div>
      </div>
      <div class="wave-line" aria-hidden="true">
        <div class="wave-line-inner">
          <svg viewBox="0 0 240 24" preserveAspectRatio="none">
            <defs>
              <linearGradient id="greenStroke" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="rgba(249,115,22,0)"/>
                <stop offset="12%"  stop-color="#F97316"/>
                <stop offset="50%"  stop-color="#FFEDD5"/>
                <stop offset="88%"  stop-color="#F97316"/>
                <stop offset="100%" stop-color="rgba(249,115,22,0)"/>
              </linearGradient>
              <linearGradient id="greenStrokeSoft" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="transparent"/>
                <stop offset="50%"  stop-color="#EA580C"/>
                <stop offset="100%" stop-color="transparent"/>
              </linearGradient>
              <filter id="greenGlow" x="-20%" y="-80%" width="140%" height="260%">
                <feGaussianBlur stdDeviation="1.8" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <path class="wave-path-2" d="M0,12 C7,19 13,19 20,12 C27,5 33,5 40,12 C47,19 53,19 60,12 C67,5 73,5 80,12 C87,19 93,19 100,12 C107,5 113,5 120,12 C127,19 133,19 140,12 C147,5 153,5 160,12 C167,19 173,19 180,12 C187,5 193,5 200,12 C207,19 213,19 220,12 C227,5 233,5 240,12"/>
            <path class="wave-path"   d="M0,12 C7,19 13,19 20,12 C27,5 33,5 40,12 C47,19 53,19 60,12 C67,5 73,5 80,12 C87,19 93,19 100,12 C107,5 113,5 120,12 C127,19 133,19 140,12 C147,5 153,5 160,12 C167,19 173,19 180,12 C187,5 193,5 200,12 C207,19 213,19 220,12 C227,5 233,5 240,12"/>
          </svg>
        </div>
      </div>
      <div class="menu-dots" id="menuDots">
        <span></span><span></span><span></span>
      </div>
      <div class="action-orb-wrap" aria-hidden="true">
        <div class="orb-glow"></div>
        <div class="orb-ring-static" id="orbRingStatic"></div>
        <div class="action-orb"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Anillo de partículas fijas alrededor de la esfera (mockup imagen 1)
  ;(function() {
    const ring = document.getElementById('orbRingStatic')
    if (!ring) return
    const N = 18
    for (let i = 0; i < N; i++) {
      const d = document.createElement('span')
      d.className = 'orb-dot'
      const angle = (i / N) * 360
      d.style.setProperty('--angle', angle + 'deg')
      d.style.setProperty('--tw-delay', ((i / N) * 2.2).toFixed(2) + 's')
      const sz = 2 + (i % 3) * 0.5
      d.style.width = sz + 'px'
      d.style.height = sz + 'px'
      d.style.margin = (-sz / 2) + 'px 0 0 ' + (-sz / 2) + 'px'
      ring.appendChild(d)
    }
  })()

  // ── Estado ──────────────────────────────────────────────────────────────────
  const root     = document.getElementById('root')
  const statusEl = document.getElementById('status')
  const LABELS = {
    idle:      'Listo para ayudarte',
    user:      'Escuchando...',
    thinking:  'Pensando...',
    ai:        'Hablando...',
    connecting:'Conectando...',
    capturing: 'Tomando captura...',
    analyzing: 'Analizando pantalla...',
  }
  let cur = 'idle'

  // Llamada por widget.py via evaluate_js("setState('...')")
  function setState(s) {
    if (!s || s === cur) return
    cur = s
    root.className = LABELS[s] ? s : 'idle'
    statusEl.textContent = LABELS[s] || LABELS.idle
  }

  // ── Animación ────────────────────────────────────────────────────────────────
  const SPIN_DEG = {
    idle:0.025, user:0.111, thinking:0.026, ai:0.063,
    connecting:0.05, capturing:0.083, analyzing:0.05,
  }
  const WAVE_PX = {
    idle:0.28, user:1.40, thinking:0.38, ai:0.90,
    connecting:0.65, capturing:1.80, analyzing:0.85,
  }

  const spinner   = document.querySelector('.border-spinner')
  const waveInner = document.querySelector('.wave-line-inner')
  const waveCont  = document.querySelector('.wave-line')
  let spinAngle = 0, waveX = 0

  function tick() {
    const s = cur || 'idle'
    spinAngle = (spinAngle + (SPIN_DEG[s] ?? 0.025)) % 360
    spinner.style.transform = `rotate(${spinAngle}deg)`
    const W = waveCont.offsetWidth || 200
    waveX -= WAVE_PX[s] ?? 0.28
    if (waveX <= -W) waveX += W
    waveInner.style.transform = `translateY(-50%) translateX(${waveX}px)`
    requestAnimationFrame(tick)
  }
  requestAnimationFrame(tick)

  // ── API pywebview (wrapper seguro) ───────────────────────────────────────────
  function api(method, ...args) {
    try {
      if (window.pywebview && window.pywebview.api) {
        return window.pywebview.api[method](...args)
      }
    } catch(e) {}
    return Promise.resolve(null)
  }

  // ── Activar (clic en pill) ────────────────────────────────────────────────────
  document.querySelector('.pill').addEventListener('click', e => {
    if (e.target.closest('#menuDots') || e.target.closest('.popup-panel')) return
    api('activate')
    setState('connecting')
  })

  // ── Popup expandido ───────────────────────────────────────────────────────────
  const VOICES = ['cedar','alloy','ash','ballad','coral','echo','sage','shimmer','verse']
  const ACTIONS = [
    { icon: '🔀', label: 'Git status',   cmd: 'dame el git status del proyecto' },
    { icon: '📷', label: 'Ver pantalla', cmd: 'mira la pantalla y dime qué ves' },
    { icon: '🧪', label: 'Tests',        cmd: 'corre los tests y dime el resultado' },
    { icon: '💾', label: 'Commit',       cmd: 'haz commit de los cambios actuales con un mensaje descriptivo' },
  ]
  // pill(56) + gap(8) + popup: proyecto+sep+acciones+sep+voz+sep+stop ≈ 400
  const POPUP_H = 460
  let activeVoice = 'cedar'
  let activeProject = ''
  let popupEl = null, popupOpen = false

  function buildPopup() {
    const p = document.createElement('div')
    p.className = 'popup-panel'

    // ── Proyecto activo ──────────────────────────────────────────────
    const projRow = document.createElement('div')
    projRow.className = 'popup-project-row'
    const projIcon = document.createElement('span')
    projIcon.className = 'popup-project-icon'
    projIcon.textContent = '📁'
    const projName = document.createElement('span')
    projName.className = 'popup-project-name'
    projName.id = 'popupProjectName'
    projName.textContent = activeProject
      ? activeProject.split('/').pop()
      : 'Cargando...'
    const projBtn = document.createElement('div')
    projBtn.className = 'popup-project-change'
    projBtn.textContent = 'Cambiar'
    projBtn.addEventListener('click', e => {
      e.stopPropagation()
      api('pick_project').then(path => {
        if (path) {
          activeProject = path
          projName.textContent = path.split('/').pop()
        }
      })
    })
    projRow.appendChild(projIcon)
    projRow.appendChild(projName)
    projRow.appendChild(projBtn)
    p.appendChild(projRow)

    p.appendChild(_sep())

    // ── Acciones rápidas ─────────────────────────────────────────────
    const actLbl = document.createElement('div')
    actLbl.className = 'popup-section-label'
    actLbl.textContent = 'Acciones rápidas'
    p.appendChild(actLbl)

    const actGrid = document.createElement('div')
    actGrid.className = 'actions-grid'
    ACTIONS.forEach(({ icon, label, cmd }) => {
      const btn = document.createElement('div')
      btn.className = 'action-btn'
      btn.innerHTML = `<span class="action-icon">${icon}</span><span class="action-label">${label}</span>`
      btn.addEventListener('click', e => {
        e.stopPropagation()
        api('send_command', cmd)
        closePopup()
      })
      actGrid.appendChild(btn)
    })
    p.appendChild(actGrid)

    p.appendChild(_sep())

    // ── Voz del agente ───────────────────────────────────────────────
    const voiceLbl = document.createElement('div')
    voiceLbl.className = 'popup-section-label'
    voiceLbl.textContent = 'Voz del agente'
    p.appendChild(voiceLbl)

    const grid = document.createElement('div')
    grid.className = 'voice-grid'
    VOICES.forEach(v => {
      const chip = document.createElement('div')
      chip.className = 'voice-chip' + (v === activeVoice ? ' active' : '')
      chip.textContent = v
      chip.dataset.voice = v
      chip.addEventListener('click', e => { e.stopPropagation(); selectVoice(v) })
      grid.appendChild(chip)
    })
    p.appendChild(grid)

    p.appendChild(_sep())

    // ── Detener sesión ───────────────────────────────────────────────
    const stop = document.createElement('div')
    stop.className = 'popup-btn danger'
    stop.innerHTML = '<span class="popup-btn-icon">⏹</span><span class="popup-btn-text">Detener sesión</span>'
    stop.addEventListener('click', e => {
      e.stopPropagation()
      api('stop_session')
      closePopup()
    })
    p.appendChild(stop)

    return p
  }

  function _sep() {
    const s = document.createElement('div')
    s.className = 'popup-sep'
    return s
  }

  function openPopup() {
    if (popupOpen) return
    popupOpen = true
    document.getElementById('menuDots').classList.add('open')
    api('expand', POPUP_H).then(() => {
      popupEl = buildPopup()
      document.getElementById('root').appendChild(popupEl)
      // Cargar proyecto actual
      api('get_project').then(path => {
        if (path) {
          activeProject = path
          const el = document.getElementById('popupProjectName')
          if (el) el.textContent = path.split('/').pop()
        }
      })
    })
  }

  function closePopup() {
    if (!popupOpen || !popupEl) return
    popupOpen = false
    document.getElementById('menuDots').classList.remove('open')
    popupEl.classList.add('closing')
    const el = popupEl; popupEl = null
    setTimeout(() => {
      el && el.parentNode && el.parentNode.removeChild(el)
      api('collapse')
    }, 150)
  }

  document.getElementById('menuDots').addEventListener('click', e => {
    e.stopPropagation()
    popupOpen ? closePopup() : openPopup()
  })

  document.addEventListener('click', e => {
    if (popupOpen && popupEl &&
        !popupEl.contains(e.target) &&
        !document.getElementById('menuDots').contains(e.target)) {
      closePopup()
    }
  })

  // ── Cambiar voz ───────────────────────────────────────────────────────────────
  function selectVoice(v) {
    activeVoice = v
    api('set_voice', v)
    if (popupEl) {
      popupEl.querySelectorAll('.voice-chip').forEach(c =>
        c.classList.toggle('active', c.dataset.voice === v)
      )
    }
    setTimeout(closePopup, 300)
  }

  // ── Cargar voz guardada al iniciar ────────────────────────────────────────────
  function initVoice() {
    api('get_voice').then(v => { if (v) activeVoice = v })
  }
  if (window.pywebview) { initVoice() }
  else { window.addEventListener('pywebviewready', initVoice) }
</script>
</body>
</html>

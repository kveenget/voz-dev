<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    -webkit-app-region: drag;
  }

  #root {
    animation: enter 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    transform: translateY(-10px) scale(0.96);
    opacity: 0;
  }
  @keyframes enter { to { transform: translateY(0) scale(1); opacity: 1; } }

  .pill-wrap, .pill { cursor: pointer; }
  .pill-wrap {
    position: relative;
    padding: 2.5px;
    border-radius: 999px;
    overflow: hidden;
    background: transparent;
  }

  .border-spinner {
    position: absolute;
    top: 50%; left: 50%;
    width: 480px; height: 480px;
    margin: -240px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0%, transparent 67%,
      rgba(34,197,94,0.08) 72%,
      #86EFAC 79%, #22C55E 82%,
      rgba(22,163,74,0.08) 87%,
      transparent 92%, transparent 100%
    );
    will-change: transform;
    pointer-events: none;
  }
  .idle .border-spinner {
    background: conic-gradient(
      from 0deg,
      transparent 0%, transparent 67%,
      rgba(160,160,160,0.06) 72%,
      #9E9E9E 79%, #757575 82%,
      rgba(120,120,120,0.06) 87%,
      transparent 92%, transparent 100%
    );
  }

  .pill {
    position: relative;
    z-index: 1;
    width: 360px;
    height: 56px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(14,12,10,0.98) 0%, rgba(4,4,4,0.98) 100%);
    display: flex;
    align-items: center;
    padding: 0 14px 0 12px;
    gap: 10px;
  }

  /* Icono Mike: punto central + anillos pulsantes (mockup) */
  .agent-icon {
    position: relative;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-core {
    position: relative; z-index: 3;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #22C55E;
    box-shadow: 0 0 10px rgba(74,222,128,0.95), 0 0 18px rgba(34,197,94,0.55);
  }
  .icon-ring {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 1.5px solid rgba(34,197,94,0.55);
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: icon-ring-pulse 2.2s ease-out infinite;
  }
  .icon-ring.r1 { width: 14px; height: 14px; animation-delay: 0s; }
  .icon-ring.r2 { width: 22px; height: 22px; animation-delay: 0.55s; border-color: rgba(34,197,94,0.38); }
  .icon-ring.r3 { width: 30px; height: 30px; animation-delay: 1.1s; border-color: rgba(34,197,94,0.22); }
  .icon-bars { display: none; }

  .capture-icon {
    display: none;
    position: relative; z-index: 1;
    width: 18px; height: 13px;
    border: 2px solid #22C55E;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(34,197,94,0.5);
  }
  .capture-icon::before {
    content: '';
    position: absolute; top: -5px; left: 4px;
    width: 6px; height: 4px;
    border: 2px solid #22C55E; border-bottom: none;
    border-radius: 3px 3px 0 0;
  }
  .capture-icon::after {
    content: '';
    position: absolute; top: 3px; right: -3px;
    width: 5px; height: 5px;
    border-radius: 50%; background: #86EFAC;
    animation: capture-blink 0.9s ease-in-out infinite;
  }

  .text-block {
    flex-shrink: 0; min-width: 108px; user-select: none;
  }
  .title {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.96); line-height: 1.2;
  }
  .status {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 12px; font-weight: 500;
    color: #22C55E; line-height: 1.25; margin-top: 2px;
    transition: color 0.35s ease;
  }

  .wave-line {
    flex: 1; min-width: 0; height: 28px;
    position: relative; overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
    mask-image:         linear-gradient(90deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
  }
  .wave-line-inner {
    position: absolute; top: 50%; left: 0;
    width: 200%; height: 24px;
    will-change: transform;
  }
  .wave-line svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .wave-path {
    fill: none;
    stroke: url(#greenStroke);
    stroke-width: 2.2;
    stroke-linecap: round; stroke-linejoin: round;
    filter: url(#greenGlow);
  }
  .wave-path-2 {
    fill: none;
    stroke: url(#greenStrokeSoft);
    stroke-width: 4; stroke-linecap: round; opacity: 0.35;
  }

  /* ── Tres puntos interactivos ── */
  .menu-dots {
    display: flex; flex-direction: column; gap: 3px;
    flex-shrink: 0; padding: 6px 5px;
    border-radius: 7px;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s;
    opacity: 0.4;
    -webkit-user-select: none;
  }
  .menu-dots:hover { opacity: 1; background: rgba(255,255,255,0.07); }
  .menu-dots.open  { opacity: 1; background: rgba(34,197,94,0.13); }
  .menu-dots span {
    display: block; width: 3px; height: 3px;
    border-radius: 50%; background: rgba(255,255,255,0.55);
    transition: background 0.2s;
  }
  .menu-dots.open span { background: #4ADE80; }

  /* Esfera derecha: glow verde + partículas en anillo */
  .action-orb-wrap {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-glow {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(34,197,94,0.65) 0%,
      rgba(34,197,94,0.28) 38%,
      rgba(22,163,74,0.08) 58%,
      transparent 72%);
    filter: blur(5px);
    animation: orb-glow-pulse 2.8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb-ring-static {
    position: absolute;
    width: 44px; height: 44px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .orb-dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 3px; height: 3px;
    margin: -1.5px 0 0 -1.5px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #F0FDF4 0%, #4ADE80 55%, #16A34A 100%);
    box-shadow: 0 0 5px rgba(74,222,128,0.9);
    transform: rotate(var(--angle)) translateY(-21px);
    animation: dot-twinkle 2.4s ease-in-out infinite;
    animation-delay: var(--tw-delay, 0s);
  }
  .action-orb {
    position: relative; z-index: 1;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 34% 28%,
      #F0FDF4 0%,
      #BBF7D0 12%,
      #4ADE80 28%,
      #22C55E 52%,
      #16A34A 72%,
      #14532D 92%,
      #052E16 100%);
    box-shadow:
      inset 0 3px 7px rgba(220,252,231,0.75),
      inset 0 -5px 12px rgba(21,128,61,0.65),
      inset -4px -2px 8px rgba(20,83,45,0.45),
      0 0 16px rgba(34,197,94,0.4),
      0 4px 10px rgba(0,0,0,0.35);
    animation: orb-float 3s ease-in-out infinite;
    overflow: visible;
  }
  .action-orb::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 72% 78%,
      transparent 55%,
      rgba(5,46,22,0.55) 100%);
    pointer-events: none;
  }
  .action-orb::after {
    content: '';
    position: absolute; top: 10%; left: 16%;
    width: 38%; height: 26%; border-radius: 50%;
    background: radial-gradient(ellipse,
      rgba(255,255,255,0.92) 0%,
      rgba(240,253,244,0.35) 45%,
      transparent 72%);
    animation: orb-specular 2.8s ease-in-out infinite;
    pointer-events: none;
  }

  /* Partículas orbitales — círculo completo alrededor de la esfera */
  .orb-particle {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    pointer-events: none;
    transform-origin: 0 0;
    /* dur, delay, pdur, pdelay se inyectan como custom props en JS por elemento */
    animation:
      p-orbit var(--dur, 3s) linear infinite var(--delay, 0s),
      p-pulse var(--pdur, 1.8s) ease-in-out infinite var(--pdelay, 0s);
  }
  @keyframes p-orbit {
    from { transform: rotate(0deg)   translateX(var(--r, 24px)); }
    to   { transform: rotate(360deg) translateX(var(--r, 24px)); }
  }
  @keyframes p-pulse {
    0%,100% { opacity: var(--opa-lo); box-shadow: 0 0 3px 1px rgba(74,222,128,0.55); }
    50%     { opacity: var(--opa-hi); box-shadow: 0 0 8px 3px rgba(74,222,128,1), 0 0 16px 6px rgba(34,197,94,0.45); }
  }
  .idle .orb-particle { filter: saturate(0) brightness(0.45); opacity: 0.25 !important; }

  /* ── Estados ── */
  .idle .status { color: #757575; }
  .idle .wave-path { stroke-width: 1.4; opacity: 0.35; }
  .idle .action-orb {
    background: radial-gradient(circle at 34% 28%,
      #E8E8E8 0%, #BDBDBD 25%, #9E9E9E 55%, #616161 80%, #424242 100%);
    box-shadow:
      inset 0 2px 6px rgba(255,255,255,0.45),
      inset 0 -4px 10px rgba(0,0,0,0.45),
      0 0 8px rgba(120,120,120,0.2);
  }
  .idle .action-orb::before {
    background: radial-gradient(circle at 72% 78%,
      transparent 50%, rgba(30,30,30,0.5) 100%);
  }
  .idle .icon-core {
    background: #9E9E9E;
    box-shadow: 0 0 6px rgba(180,180,180,0.5);
  }
  .idle .icon-ring { border-color: rgba(140,140,140,0.35); }
  .idle .orb-glow { opacity: 0.35; filter: blur(5px) saturate(0.3); }
  .idle .orb-dot { filter: saturate(0.2) brightness(0.5); opacity: 0.35; }

  .user .status { color: #4ADE80; }
  .user .wave-path { stroke-width: 2.6; }
  .user .icon-core { animation: icon-core-pulse 0.5s ease-in-out infinite; }
  .user .icon-ring { animation-duration: 1.1s; }

  .thinking .status { color: #4ADE80; }
  .thinking .wave-path { stroke-width: 1.4; opacity: 0.6; }
  .thinking .action-orb { animation: orb-float 2.2s ease-in-out infinite, orb-breathe 2.2s ease-in-out infinite; }

  .ai .status { color: #86EFAC; }
  .ai .wave-path { stroke-width: 2.4; }
  .ai .icon-core { box-shadow: 0 0 14px rgba(134,239,172,1); }

  .connecting .status { color: #16A34A; }
  .capturing .status { color: #86EFAC; }
  .capturing .icon-bars { display: none !important; }
  .capturing .capture-icon { display: block; animation: capture-pulse 0.7s ease-in-out infinite; }
  .capturing .pill { animation: capture-flash 1.4s ease-in-out infinite; }
  .capturing .wave-path { stroke: #DCFCE7; stroke-width: 2.8; opacity: 1; }
  .capturing .action-orb { animation: capture-pulse 0.7s ease-in-out infinite; }
  .analyzing .status { color: #A7F3D0; }
  .analyzing .wave-path { stroke-width: 2.2; opacity: 0.85; }
  .analyzing .icon-ring { animation-duration: 0.9s; }

  /* ── Menú contextual ── */
  .ctx-menu {
    position: fixed;
    top: 68px; right: 4px;
    width: 216px;
    background: rgba(10,10,10,0.97);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 10px;
    z-index: 9999;
    box-shadow: 0 12px 40px rgba(0,0,0,0.75), 0 0 0 1px rgba(34,197,94,0.07);
    transform-origin: top right;
    animation: menu-in 0.18s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }
  .ctx-menu.closing { animation: menu-out 0.13s ease-in forwards; pointer-events: none; }

  @keyframes menu-in {
    from { opacity:0; transform:scale(0.9) translateY(-6px); }
    to   { opacity:1; transform:scale(1)   translateY(0); }
  }
  @keyframes menu-out {
    from { opacity:1; transform:scale(1)   translateY(0); }
    to   { opacity:0; transform:scale(0.9) translateY(-6px); }
  }

  .ctx-label {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: rgba(255,255,255,0.28);
    padding: 2px 6px 7px;
  }
  .voice-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    margin-bottom: 8px;
  }
  .voice-chip {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 12px; font-weight: 500; text-align: center;
    color: rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 6px 4px;
    cursor: pointer; text-transform: capitalize;
    transition: all 0.14s ease;
  }
  .voice-chip:hover {
    background: rgba(34,197,94,0.1);
    border-color: rgba(34,197,94,0.3);
    color: #86EFAC;
  }
  .voice-chip.active {
    background: rgba(34,197,94,0.15);
    border-color: rgba(34,197,94,0.55);
    color: #4ADE80; font-weight: 700;
  }
  .ctx-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 6px 0; }
  .ctx-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 8px; border-radius: 8px; cursor: pointer;
    transition: background 0.14s;
  }
  .ctx-btn:hover { background: rgba(255,255,255,0.06); }
  .ctx-btn.danger:hover { background: rgba(239,68,68,0.12); }
  .ctx-btn-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
  .ctx-btn-text {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.75);
  }
  .ctx-btn.danger .ctx-btn-text { color: rgba(248,113,113,0.85); }

  /* ── Keyframes ── */
  @keyframes icon-ring-pulse {
    0%   { transform: translate(-50%,-50%) scale(0.82); opacity: 0.85; }
    70%  { opacity: 0.35; }
    100% { transform: translate(-50%,-50%) scale(1.18); opacity: 0; }
  }
  @keyframes icon-core-pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.2); }
  }
  @keyframes orb-glow-pulse {
    0%,100% { opacity: 0.75; transform: scale(0.96); }
    50%     { opacity: 1; transform: scale(1.06); }
  }
  @keyframes dot-twinkle {
    0%,100% { opacity: 0.45; transform: rotate(var(--angle)) translateY(-21px) scale(0.85); }
    50%     { opacity: 1; transform: rotate(var(--angle)) translateY(-21px) scale(1.15); }
  }
  @keyframes bar-shimmer {
    0%,100%{transform:scaleY(.88);box-shadow:0 0 5px rgba(34,197,94,.55)}
    50%    {transform:scaleY(1.14);box-shadow:0 0 12px rgba(74,222,128,1)}
  }
  @keyframes orb-float { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
  @keyframes orb-specular {
    0%,100%{opacity:.75;transform:translate(0,0)} 50%{opacity:1;transform:translate(1px,1px)}
  }
  @keyframes orb-breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes capture-pulse {
    0%,100%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.08);filter:brightness(1.35)}
  }
  @keyframes capture-blink { 0%,100%{opacity:.35} 50%{opacity:1} }
  @keyframes capture-flash {
    0%,100%{box-shadow:inset 0 0 0 rgba(74,222,128,0)} 45%{box-shadow:inset 0 0 28px rgba(74,222,128,.25)}
  }
</style>
</head>
<body>
<div class="idle" id="root">
  <div class="pill-wrap">
    <div class="border-spinner"></div>
    <div class="pill">
      <div class="agent-icon">
        <span class="icon-ring r3" aria-hidden="true"></span>
        <span class="icon-ring r2" aria-hidden="true"></span>
        <span class="icon-ring r1" aria-hidden="true"></span>
        <span class="icon-core" aria-hidden="true"></span>
        <div class="icon-bars" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="capture-icon" aria-hidden="true"></div>
      </div>
      <div class="text-block">
        <div class="title">Mike</div>
        <div class="status" id="status">Listo para ayudarte</div>
      </div>
      <div class="wave-line" aria-hidden="true">
        <div class="wave-line-inner">
          <svg viewBox="0 0 240 24" preserveAspectRatio="none">
            <defs>
              <linearGradient id="greenStroke" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="rgba(34,197,94,0)"/>
                <stop offset="12%"  stop-color="#22C55E"/>
                <stop offset="50%"  stop-color="#DCFCE7"/>
                <stop offset="88%"  stop-color="#22C55E"/>
                <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
              </linearGradient>
              <linearGradient id="greenStrokeSoft" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="transparent"/>
                <stop offset="50%"  stop-color="#16A34A"/>
                <stop offset="100%" stop-color="transparent"/>
              </linearGradient>
              <filter id="greenGlow" x="-20%" y="-80%" width="140%" height="260%">
                <feGaussianBlur stdDeviation="1.8" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <path class="wave-path-2" d="M0,12 C7,19 13,19 20,12 C27,5 33,5 40,12 C47,19 53,19 60,12 C67,5 73,5 80,12 C87,19 93,19 100,12 C107,5 113,5 120,12 C127,19 133,19 140,12 C147,5 153,5 160,12 C167,19 173,19 180,12 C187,5 193,5 200,12 C207,19 213,19 220,12 C227,5 233,5 240,12"/>
            <path class="wave-path"   d="M0,12 C7,19 13,19 20,12 C27,5 33,5 40,12 C47,19 53,19 60,12 C67,5 73,5 80,12 C87,19 93,19 100,12 C107,5 113,5 120,12 C127,19 133,19 140,12 C147,5 153,5 160,12 C167,19 173,19 180,12 C187,5 193,5 200,12 C207,19 213,19 220,12 C227,5 233,5 240,12"/>
          </svg>
        </div>
      </div>
      <div class="menu-dots" id="menuDots">
        <span></span><span></span><span></span>
      </div>
      <div class="action-orb-wrap" aria-hidden="true">
        <div class="orb-glow"></div>
        <div class="orb-ring-static" id="orbRingStatic"></div>
        <div class="action-orb"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Anillo de partículas fijas alrededor de la esfera (mockup imagen 1)
  ;(function() {
    const ring = document.getElementById('orbRingStatic')
    if (!ring) return
    const N = 18
    for (let i = 0; i < N; i++) {
      const d = document.createElement('span')
      d.className = 'orb-dot'
      const angle = (i / N) * 360
      d.style.setProperty('--angle', angle + 'deg')
      d.style.setProperty('--tw-delay', ((i / N) * 2.2).toFixed(2) + 's')
      const sz = 2 + (i % 3) * 0.5
      d.style.width = sz + 'px'
      d.style.height = sz + 'px'
      d.style.margin = (-sz / 2) + 'px 0 0 ' + (-sz / 2) + 'px'
      ring.appendChild(d)
    }
  })()

  // ── Estado ──────────────────────────────────────────────────────────────────
  const root     = document.getElementById('root')
  const statusEl = document.getElementById('status')
  const LABELS = {
    idle:      'Listo para ayudarte',
    user:      'Escuchando...',
    thinking:  'Pensando...',
    ai:        'Hablando...',
    connecting:'Conectando...',
    capturing: 'Tomando captura...',
    analyzing: 'Analizando pantalla...',
  }
  let cur = 'idle'

  // Llamada por widget.py via evaluate_js("setState('...')")
  function setState(s) {
    if (!s || s === cur) return
    cur = s
    root.className = LABELS[s] ? s : 'idle'
    statusEl.textContent = LABELS[s] || LABELS.idle
  }

  // ── Animación ────────────────────────────────────────────────────────────────
  const SPIN_DEG = {
    idle:0.025, user:0.111, thinking:0.026, ai:0.063,
    connecting:0.05, capturing:0.083, analyzing:0.05,
  }
  const WAVE_PX = {
    idle:0.28, user:1.40, thinking:0.38, ai:0.90,
    connecting:0.65, capturing:1.80, analyzing:0.85,
  }

  const spinner   = document.querySelector('.border-spinner')
  const waveInner = document.querySelector('.wave-line-inner')
  const waveCont  = document.querySelector('.wave-line')
  let spinAngle = 0, waveX = 0

  function tick() {
    const s = cur || 'idle'
    spinAngle = (spinAngle + (SPIN_DEG[s] ?? 0.025)) % 360
    spinner.style.transform = `rotate(${spinAngle}deg)`
    const W = waveCont.offsetWidth || 200
    waveX -= WAVE_PX[s] ?? 0.28
    if (waveX <= -W) waveX += W
    waveInner.style.transform = `translateY(-50%) translateX(${waveX}px)`
    requestAnimationFrame(tick)
  }
  requestAnimationFrame(tick)

  // ── API pywebview (wrapper seguro) ───────────────────────────────────────────
  function api(method, ...args) {
    try {
      if (window.pywebview && window.pywebview.api) {
        return window.pywebview.api[method](...args)
      }
    } catch(e) {}
    return Promise.resolve(null)
  }

  // ── Activar (clic en pill) ────────────────────────────────────────────────────
  document.querySelector('.pill').addEventListener('click', e => {
    if (e.target.closest('#menuDots') || e.target.closest('.ctx-menu')) return
    api('activate')
    setState('connecting')
  })

  // ── Menú contextual ────────────────────────────────────────────────────────────
  const VOICES = ['cedar','alloy','ash','ballad','coral','echo','sage','shimmer','verse']
  let activeVoice = 'cedar'
  let menuEl = null, menuOpen = false

  function buildMenu() {
    const m = document.createElement('div')
    m.className = 'ctx-menu'

    // Sección voz
    const lbl = document.createElement('div')
    lbl.className = 'ctx-label'
    lbl.textContent = 'Voz del agente'
    m.appendChild(lbl)

    const grid = document.createElement('div')
    grid.className = 'voice-grid'
    VOICES.forEach(v => {
      const chip = document.createElement('div')
      chip.className = 'voice-chip' + (v === activeVoice ? ' active' : '')
      chip.textContent = v
      chip.dataset.voice = v
      chip.addEventListener('mousedown', e => { e.stopPropagation(); selectVoice(v) })
      grid.appendChild(chip)
    })
    m.appendChild(grid)

    // Separador
    const sep = document.createElement('div')
    sep.className = 'ctx-sep'
    m.appendChild(sep)

    // Detener sesión
    const stop = document.createElement('div')
    stop.className = 'ctx-btn danger'
    stop.innerHTML = '<span class="ctx-btn-icon">⏹</span><span class="ctx-btn-text">Detener sesión</span>'
    stop.addEventListener('mousedown', e => {
      e.stopPropagation()
      api('stop_session')
      closeMenu()
    })
    m.appendChild(stop)

    return m
  }

  function openMenu() {
    if (menuOpen) return
    menuOpen = true
    document.getElementById('menuDots').classList.add('open')
    menuEl = buildMenu()
    document.body.appendChild(menuEl)
  }

  function closeMenu() {
    if (!menuOpen || !menuEl) return
    menuOpen = false
    document.getElementById('menuDots').classList.remove('open')
    menuEl.classList.add('closing')
    const el = menuEl; menuEl = null
    setTimeout(() => el && el.parentNode && el.parentNode.removeChild(el), 140)
  }

  document.getElementById('menuDots').addEventListener('mousedown', e => {
    e.stopPropagation()
    menuOpen ? closeMenu() : openMenu()
  })

  document.addEventListener('mousedown', e => {
    if (menuOpen && menuEl && !menuEl.contains(e.target) &&
        !document.getElementById('menuDots').contains(e.target)) {
      closeMenu()
    }
  })

  // ── Cambiar voz ────────────────────────────────────────────────────────────────
  function selectVoice(v) {
    activeVoice = v
    api('set_voice', v)
    // Actualizar chips si el menú sigue abierto
    if (menuEl) {
      menuEl.querySelectorAll('.voice-chip').forEach(c =>
        c.classList.toggle('active', c.dataset.voice === v)
      )
    }
    setTimeout(closeMenu, 120)
  }

  // ── Cargar voz guardada al iniciar ─────────────────────────────────────────────
  function initVoice() {
    api('get_voice').then(v => { if (v) activeVoice = v })
  }
  if (window.pywebview) { initVoice() }
  else { window.addEventListener('pywebviewready', initVoice) }
</script>
</body>
</html>
